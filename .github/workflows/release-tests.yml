name: Release Tests

on:
  pull_request:

permissions:
  contents: read

env:
  STAMPED_VERSION: v9.9.9-ci.${{ github.event.pull_request.head.sha }}

jobs:
  release-macos:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Prepare release-shaped build
        uses: tanaabased/prepare-release-action@v1
        with:
          version: dev
          sync: false
          commands: |
            bun run lint
            bun run build
            version-injector dist/brewgen.sh --style sh --version "${{ env.STAMPED_VERSION }}"

      - name: Verify stamped release entrypoint
        shell: bash
        run: |
          actual="$(bash ./dist/brewgen.sh --version)"
          printf 'actual=%s\n' "$actual"
          test "$actual" = "${{ env.STAMPED_VERSION }}"
