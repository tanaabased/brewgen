name: Examples Tests

on:
  pull_request:

permissions:
  contents: read

env:
  STAMPED_VERSION: v9.9.9-ci.${{ github.event.pull_request.head.sha }}

jobs:
  examples:
    name: ${{ matrix.runs-on }} / ${{ matrix.example }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-26
        example:
          - cli-contract
          - envvars
          - minimal
          - options
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Prepare release-shaped build
        uses: tanaabased/prepare-release-action@v1
        with:
          version: dev
          sync: false
          commands: |
            bun run build
            version-injector dist/brewgen.sh --style sh --version "${{ env.STAMPED_VERSION }}"
      - name: Create brewgen alias for Leia examples
        shell: bash
        run: ln -sf brewgen.sh dist/brewgen
      - name: Put prepared brewgen on PATH
        shell: bash
        run: echo "$PWD/dist" >> "$GITHUB_PATH"
      - name: Verify example ${{ matrix.example }} with Leia
        shell: bash
        env:
          TMPDIR: ${{ github.workspace }}/examples/${{ matrix.example }}/.tmp
        run: |
          mkdir -p "$TMPDIR"
          bun run leia "examples/${{ matrix.example }}/README.md" --stdin
